[project]
name = "starlette-cms"
version = "0.4.0"
description = "Headless CMS for Starlette — block registry, document API, webhooks, schema versioning"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Joel Lithgow" }]
requires-python = ">=3.12"
keywords = ["starlette", "cms", "asgi", "headless", "content"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "starlette>=1.0",
    "pydantic>=2.0",
    "piccolo>=1.0",
    "nanoid>=2.0",
    "anyio",
    "click>=8.0",
]

[project.optional-dependencies]
mcp = ["mcp>=1.0"]
postgres = ["asyncpg>=0.29"]
dev = ["starlette-cms[mcp,postgres]", "uvicorn>=0.30", "httpx>=0.27"]

[project.scripts]
cms = "starlette_cms.cli:main"

[project.urls]
Homepage = "https://github.com/ASneakyToast/astraeus"
Repository = "https://github.com/ASneakyToast/astraeus"
Issues = "https://github.com/ASneakyToast/astraeus/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
