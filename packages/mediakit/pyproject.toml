[project]
name = "mediakit"
version = "0.2.0"
description = "Media management for Starlette — S3-compatible storage, IIIF Image API, upload flow, admin UI"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Joel Lithgow" }]
requires-python = ">=3.12"
keywords = ["starlette", "media", "s3", "iiif", "asgi", "upload"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "starlette>=1.0",
    "obstore>=0.10",
    "Pillow>=11.0",
    "aiosqlite>=0.20",
    "pydantic>=2.0",
    "anyio",
    "click>=8.0",
]

[project.optional-dependencies]
mcp = ["mcp>=1.0"]
admin = ["jinja2>=3.1", "python-multipart>=0.0.9"]
fastapi = ["fastapi>=0.115"]
cli = ["click>=8.0", "uvicorn>=0.30"]
full = ["mediakit[mcp,admin,fastapi,cli]"]
dev = ["mediakit[full]", "httpx>=0.27"]

[project.scripts]
mediakit = "mediakit.cli:main"

[project.urls]
Homepage = "https://github.com/ASneakyToast/astraeus"
Repository = "https://github.com/ASneakyToast/astraeus"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
