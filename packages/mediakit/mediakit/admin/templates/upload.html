{% extends "base.html" %}

{% block title %}Upload — MediaKit Admin{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Upload Assets</h1>
</div>

<div class="upload-container">
    <div
        class="drop-zone"
        id="drop-zone"
        role="button"
        tabindex="0"
        aria-label="Drop images here or click to select"
    >
        <div class="drop-zone-inner">
            <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/>
            </svg>
            <p class="drop-text">Drop images here</p>
            <p class="drop-subtext">or click to select files</p>
            <input type="file" id="file-input" accept="image/*" multiple hidden>
        </div>
    </div>

    <div id="upload-queue" class="upload-queue" hidden>
        <h2>Uploads</h2>
        <ul class="upload-list" id="upload-list"></ul>
    </div>
</div>
{% endblock %}
