[project]
name = "starlette-editor"
version = "0.2.0"
description = "Visual editing UI for starlette-cms — ProseMirror-based, auto-generated from block schema"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Joel Lithgow" }]
requires-python = ">=3.12"
keywords = ["starlette", "cms", "editor", "prosemirror", "asgi"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "starlette>=1.0",
    "starlette-cms>=0.4.0",
    "structlog>=24.0",
    "opentelemetry-api>=1.25",
]

[project.urls]
Homepage = "https://github.com/ASneakyToast/astraeus"
Repository = "https://github.com/ASneakyToast/astraeus"

[tool.uv.sources]
starlette-cms = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
